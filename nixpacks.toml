[phases.setup]
nixPkgs = [
    "php84",
    "php84Packages.composer",
    "php84Extensions.fileinfo",
    "php84Extensions.gd",
    "php84Extensions.zip",
    "php84Extensions.curl",
    "php84Extensions.mbstring",
    "php84Extensions.intl",
    "php84Extensions.pgsql",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.redis",
    "php84Extensions.bcmath",
    "php84Extensions.xml",
    "php84Extensions.dom",
    "php84Extensions.tokenizer",
    "php84Extensions.pcntl",
    "python311Packages.supervisor",
    "nodejs_22",
    "libreoffice-still",
]

[phases.install]
cmds = [
    "php -v && php --ini",
    "composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction",
    "npm i --no-audit --no-fund --loglevel=error",
]

[phases.build]
cmds = [
    # Download RoadRunner binary for Octane
    "./vendor/bin/rr get-binary --quiet",

    # Cache configs for prod
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",

    # Filament
    "php artisan filament:optimize",

    # Frontend build
    "npm run build",

    # supervisor assets
    "mkdir -p /etc/supervisor/conf.d/",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh"
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e

# --- ensure Laravel writable paths (volume may be empty on first boot)
mkdir -p /app/storage/framework/{cache,sessions,views} \
         /app/storage/logs \
         /app/storage/app/{private,private/livewire-tmp,public} \
         /app/bootstrap/cache
chown -R www-data:www-data /app/storage /app/bootstrap/cache || true
chmod -R 777 /app/storage /app/bootstrap/cache

# Storage symlink (idempotent)
php artisan storage:link || true

# Clear cached views (safe on first boot)
php artisan view:clear || true

# Run any outstanding migrations
php artisan migrate --force || true

# Optimize app (config, routes, events, views)
php artisan optimize

# Start supervisor (octane, scheduler, queue)
exec supervisord -c /etc/supervisord.conf -n

'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"worker-octane.conf" = '''
[program:worker-octane]
command=php /app/artisan octane:start --server=roadrunner --host=0.0.0.0 --port=%(ENV_PORT)s --rpc-port=6001 --workers=auto --max-requests=500
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
'''

"worker-scheduler.conf" = '''
[program:worker-scheduler]
process_name=%(program_name)s
command=bash -c 'exec php /app/artisan schedule:work'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/worker-scheduler.log
stderr_logfile=/var/log/worker-scheduler.log
'''

"worker-queue.conf" = '''
[program:worker-queue]
process_name=%(program_name)s
command=bash -c 'exec php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600'
user=www-data
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/worker-queue.log
stderr_logfile=/var/log/worker-queue.log
'''
